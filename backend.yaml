apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: backend
  labels: 
    app: backend
spec: 
  replicas: 1
  selector: 
    matchLabels: 
      app: backend
  template: 
    metadata: 
      name: my-template
      labels: 
        app: backend
    spec: 
      containers: 
        - name: backend-container
          image: 506995420953.dkr.ecr.us-east-2.amazonaws.com/student-backend:latest
          ports: 
            - name: backend-port
              containerPort: 8080
...
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
spec:
  type: NodePort
  selector:
    app: backend
  ports:
   - port: 8080
     targetPort: 8080