apiVersion: networking.k8s.io/v1 
kind: Ingress 
metadata: 
  name: nginx-ingress 
  annotations: 
    nginx.ingress.kubernetes.io/rewrite-target: / 
spec: 
  ingressClassName: nginx 
  rules: 
  - host: mayurcbz.space 
    http: 
      paths: 
      - path: / 
        pathType: Prefix 
        backend: 
          service: 
            name: my-svc-home 
            port: 
              number: 80 
      - path: /mobile 
        pathType: Prefix 
        backend: 
          service: 
            name: my-svc-mobile 
            port: 
              number: 8080
      - path: /laptop 
        pathType: Prefix 
        backend:  
          service:  
            name: my-svc-laptop 
            port:  
              number: 80