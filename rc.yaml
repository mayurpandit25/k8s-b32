apiVersion: v1
kind: ReplicationController 
metadata: 
  name: my-rc 
  labels: 
    app: myapp 
spec: 
  replicas: 5
  selector: 
    app: myapp
  template: 
    metadata: 
      name: my-rc-template 
      labels: 
        app: myapp
    spec: 
      containers: 
        - name: nginx-container 
          image: nginx:latest 
          ports: 
            - name: nginxport 
              containerPort: 80
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: rc-svc 
  labels: 
    app: myapp
spec: 
  type: NodePort 
  selector: 
    app: myapp
  ports: 
    - name: svc-port 
      protocol: TCP 
      port: 80
      targetPort: 80
...
